    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #dceadf;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 22px;
            padding: 30px 20px 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10),
                0 2px 6px rgba(0, 0, 0, 0.04);
            transition: transform 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .channel-name {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 30px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .flag {
            width: 22px;
            height: 22px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .subscribers {
            color: #8a8a8a;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 0.2px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 360px;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 22px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.10);
        }

        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .image-wrapper:hover .main-image {
            transform: scale(1.04);
        }

        .description {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #111;
            text-transform: uppercase;
            margin-bottom: 24px;
            padding: 0 8px;
            letter-spacing: 0.4px;
        }

        .join-btn {
            width: 230px;
            height: 62px;
            border-radius: 31px;
            background: linear-gradient(135deg, #38aef0, #2d93d6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: auto;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 0 18px rgba(56, 174, 240, 0.55);
            animation: glowPulse 2s infinite alternate;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .join-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(56, 174, 240, 0.85);
            background: linear-gradient(135deg, #45b8f5, #3498db);
        }

        .join-btn:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 10px rgba(56, 174, 240, 0.5);
            }
            50% {
                box-shadow: 0 0 22px rgba(56, 174, 240, 0.85);
            }
            100% {
                box-shadow: 0 0 10px rgba(56, 174, 240, 0.5);
            }
        }

        .telegram-icon {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .footer {
            margin-top: 24px;
            font-size: 14px;
            color: #9d9d9d;
            line-height: 1.7;
            letter-spacing: 0.2px;
        }

        .footer b {
            color: #666;
            font-weight: 700;
        }

        /* Subtle badge */
        .verified-badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #38aef0;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .verified-badge::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
        }
    </style>
</head>

<body>

<script>

    // ──────────────────────────────────────
    //  POPULATE THE DOM
    // ──────────────────────────────────────
    (function populateCard() {
        // Channel name + flag
        const channelNameEl = document.getElementById('channelName');
        channelNameEl.innerHTML = `
        ${cardData.channelName}
        <img class="flag" src="${cardData.flag}" alt="flag" />
        `;

        // Subscribers
        document.getElementById('subscribers').textContent = cardData.subscribers;

        document.getElementById('mainImage').src = cardData.image;

        document.getElementById('description').textContent = cardData.description;
