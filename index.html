<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>raj trader</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#dceadf;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:25px;
      font-family:Arial, Helvetica, sans-serif;
    }

    .card{
      width:100%;
      max-width:365px;
      background:#f7f7f7;
      border-radius:18px;
      padding:28px 18px 22px;
      text-align:center;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }

    .channel-name{
      font-family:Georgia, serif;
      font-size:28px;
      font-weight:700;
      color:#111;
      margin-bottom:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .flag{
      width:18px;
      height:18px;
      object-fit:cover;
    }

    .subscribers{
      color:#8a8a8a;
      font-size:16px;
      margin-bottom:20px;
    }

    .main-image{
      width:100%;
      height:360px;
      object-fit:cover;
      border-radius:16px;
      margin-bottom:22px;
    }

    .description{
      font-size:17px;
      font-weight:700;
      line-height:1.45;
      color:#111;
      text-transform:uppercase;
      margin-bottom:22px;
      padding:0 5px;
    }

    .join-btn{
  width:220px;             /* bigger size */
  height:60px;             /* original shape */
  border-radius:30px;
  background:#38aef0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:auto;
  text-decoration:none;
  color:#fff;
  font-size:18px;
  font-weight:700;
  box-shadow:0 0 15px rgba(56,174,240,0.6);
  animation: glow 1.5s infinite alternate;
  transition:0.3s;
}

.join-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 25px rgba(56,174,240,0.9);
}

@keyframes glow {
  0% { box-shadow: 0 0 8px rgba(56,174,240,0.6); }
  50% { box-shadow: 0 0 18px rgba(56,174,240,0.9); }
  100% { box-shadow: 0 0 8px rgba(56,174,240,0.6); }
}

    .telegram-icon{
      width:23px;
      height:23px;
    }

    .footer{
      margin-top:22px;
      font-size:14px;
      color:#9d9d9d;
      line-height:1.6;
    }

    .footer b{
      color:#777;
      font-weight:700;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="channel-name" id="channelName">
      HUNTER ARMY
      <img
        class="flag"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Flag_of_Sri_Lanka.svg/1200px-Flag_of_Sri_Lanka.svg.png"
      />
    </div>

    <div class="subscribers" id="subscribers">
      10,000 subscribers
    </div>

    <img
      id="mainImage"
      class="main-image"
      src="raj.jpg"
    />

    <div class="description" id="description">
      WANT TO HAVE THIS LUXURY LIFE, THEN CLICK THE LINK BELOW TO JOIN NOW
    </div>

    <a
      id="joinBtn"
      class="join-btn"
      href="#"
      target="_blank"
    >

      <img
        class="telegram-icon"
        src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"
      />

      <span id="buttonText">
        JOIN CHANNEL
      </span>

    </a>

    <div class="footer">
      You are invited to the channel
      <b id="footerName">HUNTER ARMY</b>
      🇱🇰.<br>
      Click above to join.
    </div>

  </div>

  <script>

    fetch("channel.json")
      .then(response => response.json())
      .then(data => {

        document.getElementById("channelName").innerHTML =
          `${data.channelName}
          <img class="flag" src="${data.flag}">`;

        document.getElementById("subscribers").innerText =
          data.subscribers;

        document.getElementById("mainImage").src =
          data.image;

        document.getElementById("description").innerText =
          data.description;

        document.getElementById("buttonText").innerText =
          data.buttonText;

        document.getElementById("joinBtn").href =
          data.telegramLink;

        document.getElementById("footerName").innerText =
          data.channelName;

      });

  </script>

</body>
</html>
